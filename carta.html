<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✈</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100svh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(175deg,#faf5ea,#f1e8d3);font-family:-apple-system,'Segoe UI',sans-serif;position:relative}
.frame{position:fixed;inset:14px;border:2px solid rgba(176,132,32,.75);border-radius:10px;pointer-events:none}
.frame:after{content:'';position:absolute;inset:7px;border:1px solid rgba(176,132,32,.45);border-radius:6px}
main{text-align:center;padding:40px}
.d{width:14px;height:14px;background:#b08420;transform:rotate(45deg);margin:0 auto 30px}
h1{color:#16294f;font-size:clamp(20px,5.5vw,28px);font-weight:600;letter-spacing:.04em}
p{color:#6b7794;font-size:clamp(13px,3.6vw,16px);margin-top:14px;letter-spacing:.14em;text-transform:uppercase}
</style>
</head>
<body>
<div class="frame"></div>
<main>
  <div class="d"></div>
  <h1>Este código aún no está activo</h1>
  <p>Vuelve el 19 de julio ✈</p>
</main>
</body>
</html>
